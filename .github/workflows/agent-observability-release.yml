name: build-and-publish

on:
  push:
    branches:
      - main
    paths:
      - 'agent-observability/**'
  workflow_dispatch:

env:
  SWR_REGISTRY: swr.cn-east-3.myhuaweicloud.com
  SWR_ORGANIZATION: kweaver-ai
  REGISTRY_IMAGE_NAME: agent-observability
  APP_PATH: agent-observability
  CHART_PATH: agent-observability/charts/agent-observability

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: agent-observability/go.mod

      - name: Go test
        working-directory: ${{ env.APP_PATH }}
        run: go test ./...

      - name: GolangCI-Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.6.2
          working-directory: ${{ env.APP_PATH }}

  build-and-push-image:
    runs-on: ubuntu-latest
    needs: test-and-lint
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to SWR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.SWR_REGISTRY }}
          username: ${{ secrets.SWR_USERNAME }}
          password: ${{ secrets.SWR_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.SWR_REGISTRY }}/${{ env.SWR_ORGANIZATION }}/${{ env.REGISTRY_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: ./agent-observability
          file: ./agent-observability/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  package-and-push-chart:
    runs-on: ubuntu-latest
    needs: build-and-push-image
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Update chart versions
        run: |
          sed -i "s/^version: .*/version: ${VERSION}/" ${CHART_PATH}/Chart.yaml
          sed -i "s/^appVersion: .*/appVersion: \"${VERSION}\"/" ${CHART_PATH}/Chart.yaml
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Helm lint
        run: helm lint ${CHART_PATH}

      - name: Helm package
        run: helm package ${CHART_PATH} --destination dist

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push chart to GHCR
        run: helm push dist/agent-observability-${{ steps.version.outputs.version }}.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
